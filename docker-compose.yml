# ──────────────────────────────────────────────────────────────────────────
# 1auction — local + Coolify deployment
# Services: web (Next.js), socket-server (Express+Socket.io), redis.
# Postgres is intentionally left to Neon (external) in the default config.
# Uncomment the `postgres` block below to run a local PG instead.
# ──────────────────────────────────────────────────────────────────────────

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: 1auction-web
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3000}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
      - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL:-http://localhost:3001}
      - SOCKET_SERVER_INTERNAL_URL=http://socket-server:3001
      - WEB_ORIGIN=${WEB_ORIGIN:-http://localhost:3000}
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  socket-server:
    build:
      context: .
      dockerfile: apps/socket-server/Dockerfile
    container_name: 1auction-socket
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
      - SOCKET_SERVER_PORT=3001
      - WEB_ORIGIN=${WEB_ORIGIN:-http://localhost:3000}
    ports:
      - "3001:3001"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: 1auction-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"

  # ── Local Postgres (optional). Use Neon in production instead. ──────────────
